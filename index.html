<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Form</title>
    <link rel="stylesheet" href="form.css" />
  </head>
  <body>
    <form action="registeration.com" method="POST" novalidate>
      <div class="container">
        <div class="main">
          <p class="accent">ACCOUNT SETUP</p>
          <h1 class="form-heading">Create your account</h1>
          <p class="form-about">
            Fill in your details below to get started. It takes less than a
            minute
          </p>
          <div class="info">
            <div class="form-body">
              <label for="full-name">Full name</label>
              <input
                type="text"
                id="full-name"
                name="full-name"
                required
                placeholder="Bash Maaruf"
              />
            </div>
            <div class="form-body">
              <label for="email">Email address </label>
              <input
                type="email"
                id="email"
                name="email"
                required
                placeholder="bashmaaruf@gmail.com"
              />
            </div>
            <div class="form-body">
              <label for="password">password</label>
              <input name="password" type="password" id="password" />
            </div>
            <div class="form-body">
              <label for="confirm-password">Confirm password</label>
              <input name="password" type="password" id="password" />
            </div>
            <div class="checkbox">
              <input
                type="checkbox"
                id="consent"
                name="consent"
                class="consent"
              />
              <label for="consent">
                i agree to the
                <a href="#">Terms and serivice</a> and
                <a href="#">Privacy Policy</a></label
              >
            </div>
            <div class="button">
              <button type="submit">Submit</button>
            </div>
          </div>
        </div>
      </div>
    </form>
  </body>
</html>
