<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Form</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      body {
        font-family: sans-serif;
        background: #363aa8;
        /* background: linear-gradient(
                90deg,
                rgba(54, 58, 168, 1) 0%,
                rgba(0, 0, 252, 0.55) 0%,
                rgba(0, 212, 255, 0.82) 98%
              ); */
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 120vh;
        color: #5b616a;
        accent-color: #4f287c;
        /* padding: 152px; */
      }

      .container {
        /* border: 3px solid; */
        height: 32rem;
        padding: 24px 32px;
        background-color: #f7f7f7;
        border-radius: 20px;
        min-width: 340px;
      }

      .info {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .accent {
        color: #275dad;
        font-size: 12px;
        letter-spacing: 1.6px;
        margin-bottom: 12px;
      }
      .form-heading {
        color: #5b616a;
        font-size: 20px;
        margin-bottom: 12px;
      }
      .form-about {
        font-size: 12px;
        margin-bottom: 16px;
      }
      .form-body {
        font-size: 12px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      input {
        padding: 12px 12px;
        border: none;
        border-radius: 8px;
        font-size: 12px;
        transition: 0.3ms;
      }
      input::placeholder {
        color: #979797;
      }
      .checkbox {
        /* margin-top: 16px; */
        margin-bottom: 12px;
        font-size: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      button {
        width: 100%;
        padding: 12px;
        font-size: 16px;
        color: #fcf7f8;
        background-color: #4f287c;
        border-radius: 8px;
        transition: 0.4ms;
        border: none;
      }
      a {
        text-decoration: none;
        color: #275dad;
      }
      .form-body label {
        color: #25283d;
      }
      button:hover,
      button:focus-visible {
        background-color: #27133e;
      }
      input:focus-visible {
        outline: none;
        box-shadow: 0px 0px 16px 4px rgba(79, 40, 124, 0.55);
        -webkit-box-shadow: 0px 0px 16px 4px rgba(79, 40, 124, 0.55);
        -moz-box-shadow: 0px 0px 16px 4px rgba(79, 40, 124, 0.55);
      }
      input[type="checkbox"] {
        width: 12px;
        height: 12px;
      }
    </style>
  </head>
  <body>
    <form action="registeration.com" method="POST" novalidate>
      <div class="container">
        <div class="main">
          <p class="accent">ACCOUNT SETUP</p>
          <h1 class="form-heading">Create your account</h1>
          <p class="form-about">
            Fill in your details below to get started. It takes less than a
            minute
          </p>
          <div class="info">
            <div class="form-body">
              <label for="full-name">Full name</label>
              <input
                type="text"
                id="full-name"
                name="full-name"
                required
                placeholder="Bash Maaruf"
              />
            </div>
            <div class="form-body">
              <label for="email">Email address </label>
              <input
                type="email"
                id="email"
                name="email"
                required
                placeholder="bashmaaruf@gmail.com"
              />
            </div>
            <div class="form-body">
              <label for="password">password</label>
              <input name="password" type="password" id="password" />
            </div>
            <div class="form-body">
              <label for="confirm-password">Confirm password</label>
              <input name="password" type="password" id="password" />
            </div>
            <div class="checkbox">
              <input
                type="checkbox"
                id="consent"
                name="consent"
                class="consent"
              />
              <label for="consent">
                i agree to the
                <a href="#">Terms and serivice</a> and
                <a href="#">Privacy Policy</a></label
              >
            </div>
            <div class="button">
              <button type="submit">Submit</button>
            </div>
          </div>
        </div>
      </div>
    </form>
  </body>
</html>
